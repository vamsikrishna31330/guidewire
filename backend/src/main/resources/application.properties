# Supabase
supabase.url=${SUPABASE_URL}
supabase.anon-key=${SUPABASE_ANON_KEY}
supabase.service-key=${SUPABASE_SERVICE_KEY}
supabase.jwt-secret=${SUPABASE_JWT_SECRET}

# Supabase PostgreSQL direct connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# External APIs
openweather.api-key=${OPENWEATHER_API_KEY:demo}
aqicn.api-key=${AQICN_API_KEY:demo}

# ML microservice
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# Trigger engine cron — runs every 30 minutes
trigger.cron=0 */30 * * * *

# Server
server.port=8080
spring.application.name=gigshield-backend

# Logging
logging.level.com.gigshield=DEBUG
logging.level.org.springframework.security=INFO
